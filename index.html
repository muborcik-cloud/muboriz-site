</form>

</div>

</section>

<section>

<h2 class="title">Чат-Бот MUBORIZ AI</h2>

<div class="chat-box">

<p>
Задайте вопрос:
</p>

<input
id="question"
placeholder="Например: кто ваш босс?">

<button onclick="askBot()">
Отправить
</button>

<button onclick="startVoice()">
🎤 Микрофон
</button>

<div id="answer"></div>

</div>

</section>

<section>

<h2 class="title">Дополнительная информация</h2>

<div class="card">

<h3>MUBORIZ</h3>

<br>

<p>

Работаю быстро и стараюсь делать красивые проекты.
</p>

<br>

<p>
Телефон:
+992 011 900 303
</p>

<br>

<p>
WhatsApp:
+992 011 900 303
</p>

</div>

</section>

<script>

function speak(text){

let speech =
new SpeechSynthesisUtterance(text);

speech.lang = "ru-RU";

window.speechSynthesis.speak(speech);

}

function askBot(){

let q =
document
.getElementById("question")
.value
.toLowerCase();

let answer =
"Я не понял вопрос.";

if(q.includes("босс"))
answer =
"Наш босс Мубориз.";

else if(q.includes("номер"))
answer =
"Номер Мубориза плюс девятьсот девяносто два ноль одиннадцать девятьсот триста три.";

else if(q.includes("цена"))
answer =
"Маленький сайт двести сомони, средний триста, большой пятьсот.";

else if(q.includes("услуги"))
answer =
"Создание сайтов под ключ.";

document
.getElementById("answer")
.innerHTML = answer;

speak(answer);

}

function startVoice(){

const recognition =
new webkitSpeechRecognition();

recognition.lang =
"ru-RU";

recognition.start();

recognition.onresult =
function(event){

let text =
event.results[0][0].transcript;

document
.getElementById("question")
.value = text;

askBot();

};

}

</script>

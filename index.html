<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мубориз | ULTRA SITE</title>

<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle,#ff0000,#1a0000);
color:white;
overflow-x:hidden;
}

header{
text-align:center;
padding:70px 20px;
}

h1{
font-size:60px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px red}
to{text-shadow:0 0 30px white}
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
padding:20px;
border-radius:20px;
transition:0.3s;
}

.card:hover{transform:scale(1.05)}

.price{
color:#fff;
font-size:25px;
font-weight:bold;
}

.btn{
display:inline-block;
padding:12px 18px;
margin:5px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

.red{background:red;color:white}
.white{background:white;color:black}

#chat{
position:fixed;
bottom:20px;
right:20px;
width:280px;
background:white;
color:black;
border-radius:15px;
overflow:hidden;
}

#top{
background:red;
color:white;
padding:10px;
text-align:center;
font-weight:bold;
}

#msgs{
height:180px;
overflow:auto;
padding:10px;
font-size:13px;
}

#box{
display:flex;
border-top:1px solid #ddd;
}

#txt{
flex:1;
padding:10px;
border:none;
outline:none;
}

#btn{
background:red;
color:white;
border:none;
padding:10px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>МУБОРИЗ</h1>
<p>Создаю премиум сайты в Душанбе</p>

<a class="btn red" href="tel:+992011900303">Позвонить</a>
<a class="btn white" href="https://wa.me/992011900303">WhatsApp</a>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>Миленький сайт</h2>
<div class="price">100 сомони</div>
</div>

<div class="card">
<h2>Средний сайт</h2>
<div class="price">300 сомони</div>
</div>

<div class="card">
<h2>Большой сайт</h2>
<div class="price">500 сомони</div>
</div>

</div>

</div>

<!-- CHAT -->
<div id="chat">
<div id="top">AI Ассистент</div>
<div id="msgs"></div>
<div id="box">
<input id="txt" placeholder="Напиши..." />
<button id="btn">➤</button>
</div>
</div>

<script>
function bot(t){
t=t.toLowerCase();

if(t.includes("имя")) return "Мубориз";
if(t.includes("номер")) return "+992 011 900 303";
if(t.includes("цена")) return "100 / 300 / 500 сомони";
if(t.includes("душанбе")) return "Работаю в Душанбе";
if(t.includes("заказать")) return "Напиши в WhatsApp";

return "Я помогу: имя, номер, цены, заказ";
}

function send(){
let t=document.getElementById("txt").value;
if(!t)return;

let m=document.getElementById("msgs");

m.innerHTML+=`<div><b>Ты:</b> ${t}</div>`;
m.innerHTML+=`<div><b>Бот:</b> ${bot(t)}</div>`;

document.getElementById("txt").value="";
m.scrollTop=m.scrollHeight;
}

document.getElementById("btn").onclick=send;
</script>

</body>
</html>

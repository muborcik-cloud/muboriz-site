<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muboriz REAL AI Pro Max</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* ===== LOADING ===== */
#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
color:gold;
}

.circle{
width:55px;
height:55px;
border:4px solid #333;
border-top:4px solid gold;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{100%{transform:rotate(360deg);}}

/* ===== BACKGROUND ===== */
video{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
z-index:-1;
}

/* ===== GENERAL ===== */
body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;
}

/* ===== NAV APP ===== */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:rgba(0,0,0,0.8);
padding:10px;
backdrop-filter:blur(10px);
}

.nav button{
background:none;
border:none;
color:white;
font-size:14px;
}

/* ===== PAGE ===== */
.page{
display:none;
padding:20px;
animation:fade .4s ease;
}

.active{display:block;}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* ===== STYLE ===== */
h1{
text-align:center;
color:gold;
text-shadow:0 0 20px gold;
}

.card{
background:rgba(255,255,255,0.06);
padding:15px;
margin:10px;
border-radius:15px;
backdrop-filter:blur(10px);
text-align:center;
}

.btn{
display:block;
margin:10px;
padding:12px;
border-radius:12px;
font-weight:bold;
text-decoration:none;
text-align:center;
}

.gold{background:gold;color:black;}
.wa{background:#25D366;}
.call{background:#1e90ff;}
.sms{background:#ff9800;}

/* ===== CHAT ===== */
.chat{
height:200px;
overflow:auto;
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:10px;
}

input{
width:70%;
padding:10px;
border:none;
border-radius:10px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:gold;
font-weight:bold;
cursor:pointer;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="circle"></div>
<p>Loading REAL AI PRO MAX...</p>
</div>

<!-- VIDEO -->
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-city-night-traffic-1578/1080p.mp4">
</video>
<div class="overlay"></div>

<!-- HOME -->
<div class="page active" id="home">

<h1>👑 MUBORIZ AI STUDIO 👑</h1>

<div class="card">
<p>👤 Мубориз</p>
<p>📞 +992 011 900 303</p>
<p>💛 Web Studio | AI System</p>
<p>💰 100 / 300 / 500 / 3000 сум</p>
</div>

<a class="btn wa" href="https://wa.me/992011900303">WhatsApp</a>
<a class="btn call" href="tel:+992011900303">Позвонить</a>
<a class="btn sms" href="sms:+992011900303">SMS</a>

</div>

<!-- CHAT -->
<div class="page" id="chat">

<h1>🤖 REAL AI CHAT</h1>

<div class="card chat" id="box"></div>

<div style="text-align:center;">
<input id="msg" placeholder="Напиши вопрос...">
<button onclick="send()">Отправить</button>
</div>

</div>

<!-- ORDER -->
<div class="page" id="order">

<h1>🛒 Заказать сайт</h1>

<div class="card">
<p>Мини сайт — 1000 сум</p>
<p>Средний — 3000 сум</p>
<p>Большой — 5000 сум</p>
</div>

<a class="btn gold" href="https://wa.me/992011900303">Заказать через WhatsApp</a>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="openPage('home')">🏠</button>
<button onclick="openPage('chat')">🤖</button>
<button onclick="openPage('order')">🛒</button>
</div>

<script>

/* ===== LOADER ===== */
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},2000);

/* ===== NAV ===== */
function openPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* ===== REAL SMART AI ===== */
function send(){
let m=document.getElementById("msg").value.toLowerCase();
if(!m) return;

let box=document.getElementById("box");

box.innerHTML+="<p>🟡 Ты: "+m+"</p>";

let reply="Я AI Muboriz Studio 🤖";

if(m.includes("босс")){
reply="Наш босс — Мубориз 👑 он создатель этого сайта.";
}
else if(m.includes("номер")){
reply="📞 +992 011 900 303";
}
else if(m.includes("о тебе")){
reply="Я создаю сайты под ключ 💛 Мини 1000 / 3000 / 5000 сум";
}
else if(m.includes("кто ты")){
reply="Я умный AI помощник Muboriz Studio 🤖";
}
else if(m.includes("услуги")){
reply="Сайты: 1000 / 3000 / 5000 сум 💛";
}

box.innerHTML+="<p>🤖 AI: "+reply+"</p>";

document.getElementById("msg").value="";
}

</script>

</body>
</html>

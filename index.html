<div class="card">
<h2>🎤 Голосовой помощник</h2>
<button onclick="startVoice()">🎙️ Говорить</button>
</div>

<script>
function startVoice(){
const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Голосовой ввод не поддерживается");
return;
}

const recognition = new SpeechRecognition();
recognition.lang = "ru-RU";

recognition.start();

recognition.onresult = function(event){
document.getElementById("msg").value =
event.results[0][0].transcript;
};
}
</script>

<div class="card">

<button onclick="setRu()">🇷🇺 Русский</button>

<div class="card">
<h2>📝 Заказать сайт</h2>

<input id="name" placeholder="Ваше имя">

<br><br>

<select id="tarif">
<option>Маленький сайт — 100 сомони</option>
<option>Средний сайт — 300 сомони</option>
<option>Большой сайт — 500 сомони</option>
</select>

<br><br>

<button onclick="order()">Отправить заказ</button>
</div>

<script>
function order(){

let name =
document.getElementById("name").value;

let tarif =
document.getElementById("tarif").value;

let text =
"Здравствуйте! Меня зовут "
+ name +
". Хочу заказать: "
+ tarif;

window.open(
"https://wa.me/992011900303?text="
+ encodeURIComponent(text)
);

}
</script>

<style>
.particles{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:-1;
}

.particle{
position:absolute;
width:6px;
height:6px;
background:gold;
border-radius:50%;
animation:fall 10s linear infinite;
}

@keyframes fall{
from{
transform:translateY(-100px);
}
to{
transform:translateY(120vh);
}
}
</style>

<div class="particles" id="particles"></div>

<script>
for(let i=0;i<40;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=Math.random()*100+"%";

p.style.animationDelay=
Math.random()*10+"s";

document
.getElementById("particles")
.appendChild(p);

}
</script>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Muboriz Web Studio</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background: radial-gradient(circle at top, #1b1b1b, #0a0a0a);
color:white;
text-align:center;
}

.container{
padding:20px;
}

h1{
font-size:28px;
margin-top:20px;
color: gold;
}

.subtitle{
color:#bbb;
margin-bottom:20px;
}

.lang-buttons button{
margin:5px;
padding:10px 15px;
border-radius:20px;
border:none;
cursor:pointer;
font-weight:bold;
}

.gold-btn{
background:gold;
color:black;
}

.btn{
display:block;
width:80%;
margin:10px auto;
padding:15px;
border-radius:15px;
font-size:18px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.whatsapp{background:#25D366;color:white;}
.call{background:#1e90ff;color:white;}
.sms{background:#ff9800;color:white;}
.route{background:#f1c40f;color:black;}

.btn:hover{
transform:scale(1.05);
opacity:0.9;
}

.card{
background:#111;
padding:15px;
margin-top:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(255,215,0,0.3);
}

</style>
</head>

<body>

<div class="container">

<h1 id="title">👑 MUBORIZ WEB STUDIO 👑</h1>
<p class="subtitle" id="subtitle">Создание сайтов • Website Creation</p>

<div class="lang-buttons">
<button class="gold-btn" onclick="setLang('ru')">Русский 🇷🇺</button>
<button class="gold-btn" onclick="setLang('tj')">Тоҷикӣ 🇹🇯</button>
</div>

<div class="card">
<p id="name">Имя: Мубориз</p>
<p>📞 +992 011 900 303</p>
</div>

<!-- BUTTONS -->
<a class="btn whatsapp" id="wa" href="https://wa.me/992011900303" target="_blank">WhatsApp 💬</a>

<a class="btn call" id="call" href="tel:+992011900303">Позвонить 📞</a>

<a class="btn sms" id="sms" href="sms:+992011900303">SMS ✉️</a>

<a class="btn route" id="route"
href="https://www.google.com/maps?q=Dushanbe"
target="_blank">Маршрут 📍</a>

<div class="card">
<h3 id="servicesTitle">Услуги</h3>
<p id="services">
Мини сайт — 100 сомон<br>
Стандартный — 300 сомон<br>
Большой сайт — 500 сомон
</p>
</div>

</div>

<script>
function setLang(lang){
if(lang === "ru"){
document.getElementById("title").innerText = "👑 MUBORIZ WEB STUDIO 👑";
document.getElementById("subtitle").innerText = "Создание сайтов • Website Creation";
document.getElementById("name").innerText = "Имя: Мубориз";
document.getElementById("servicesTitle").innerText = "Услуги";
document.getElementById("services").innerHTML =
"Мини сайт — 100 сомон<br>Стандартный — 300 сомон<br>Большой сайт — 500 сомон";

document.getElementById("call").innerText = "Позвонить 📞";
document.getElementById("sms").innerText = "SMS ✉️";
document.getElementById("route").innerText = "Маршрут 📍";
document.getElementById("wa").innerText = "WhatsApp 💬";
}

if(lang === "tj"){
document.getElementById("title").innerText = "👑 MUBORIZ WEB STUDIO 👑";
document.getElementById("subtitle").innerText = "Сохтани сомонаҳо • Website Creation";
document.getElementById("name").innerText = "Ном: Мубориз";
document.getElementById("servicesTitle").innerText = "Хизматҳо";
document.getElementById("services").innerHTML =
"Сомонаи хурд — 100 сомон<br>Миёна — 300 сомон<br>Калон — 500 сомон";

document.getElementById("call").innerText = "Занг 📞";
document.getElementById("sms").innerText = "SMS ✉️";
document.getElementById("route").innerText = "Нақша 📍";
document.getElementById("wa").innerText = "WhatsApp 💬";
}
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REAL AI APP</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* ===== GOLD APP UI ===== */
body{
margin:0;
font-family:Arial;
background:black;
color:white;
overflow:hidden;
}

/* 3D BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%, rgba(255,215,0,0.2), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(0,150,255,0.1), transparent 40%);
animation:move 6s infinite alternate;
z-index:-1;
}

@keyframes move{
0%{transform:scale(1);}
100%{transform:scale(1.2);}
}

/* APP NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:rgba(0,0,0,0.8);
backdrop-filter:blur(10px);
padding:10px;
}

/* PAGES */
.page{
display:none;
padding:20px;
animation:fade .4s ease;
}

.active{display:block;}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* GOLD TEXT */
h1{
text-align:center;
color:gold;
text-shadow:0 0 20px gold;
}

/* CARD */
.card{
background:rgba(255,255,255,0.06);
padding:15px;
border-radius:15px;
margin:10px;
backdrop-filter:blur(10px);
}

/* BUTTON */
.btn{
display:block;
margin:10px;
padding:12px;
border-radius:12px;
background:gold;
color:black;
text-align:center;
font-weight:bold;
text-decoration:none;
}

input{
width:70%;
padding:10px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- HOME -->
<div class="page active" id="home">

<h1>👑 MUBORIZ AI APP 👑</h1>

<div class="card">
<p>💛 Web Studio</p>
<p>📞 +992 011 900 303</p>
</div>

<a class="btn" href="https://wa.me/992011900303">WhatsApp</a>
</div>

<!-- AI -->
<div class="page" id="ai">

<h1>🤖 REAL AI</h1>

<div class="card" id="chat"></div>

<input id="msg" placeholder="Напиши...">
<button class="btn" onclick="send()">Send</button>

</div>

<!-- ORDER -->
<div class="page" id="order">

<h1>🛒 Заказать</h1>

<div class="card">
<p>100 / 300 / 500 сомон</p>
</div>

<a class="btn" href="https://wa.me/992011900303">Заказать</a>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="openPage('home')">🏠</button>
<button onclick="openPage('ai')">🤖</button>
<button onclick="openPage('order')">🛒</button>
</div>

<script>

/* NAV */
function openPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* SIMPLE AI (NEXT STEP → API UPGRADE) */
function send(){
let m=document.getElementById("msg").value.toLowerCase();
let chat=document.getElementById("chat");

let reply="Я AI помощник 🤖";

if(m.includes("босс")) reply="Босс — Мубориз 👑";
if(m.includes("номер")) reply="+992 011 900 303";
if(m.includes("о тебе")) reply="Я создаю сайты под ключ 💛";

chat.innerHTML+="<p>🟡 Ты: "+m+"</p>";
chat.innerHTML+="<p>🤖 AI: "+reply+"</p>";

document.getElementById("msg").value="";
}

</script>

</body>
</html>

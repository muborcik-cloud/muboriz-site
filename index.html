<style>
body{
margin:0;
font-family:Arial;
background:radial-gradient(circle at top,#0f3d0f,#000);

text-align:center;
overflow:hidden;
}

.glow{
position:absolute;
width:300px;
height:300px;
background:gold;
filter:blur(120px);
opacity:0.2;
top:10%;
left:30%;
animation:move 6s infinite alternate;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(80px);}
}

h1{
margin-top:60px;
font-size:45px;
color:gold;
text-shadow:0 0 20px gold;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border:1px solid rgba(255,215,0,0.4);
margin:20px;
padding:20px;
border-radius:20px;
}

.btn{
display:block;
width:80%;
margin:10px auto;
padding:16px;
border-radius:15px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

.whatsapp{background:#25D366;color:white;}
.call{background:#2196F3;color:white;}
.map{background:#FF9800;color:white;}
.about{background:gold;color:black;}
.chat{background:#111;color:white;border:1px solid gold;}
</style>
</head>
